<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="setup-link.css">
</head>
<body>
  <div class="popup">
    <!-- No Service -->
    <div id="stateNoService" class="state state-offline" hidden>
      <div class="offline-orb">
        <div class="offline-orb-ring"></div>
        <div class="offline-orb-dot"></div>
      </div>
      <p class="offline-heading">Waiting for server</p>
      <p class="offline-sub">The transcriber service isn't running yet</p>
      <p class="offline-path" id="offlinePath" hidden></p>
      <div class="offline-copybox">
        <code class="offline-copybox-code" id="offlineCommand">npm run dev</code>
        <button class="offline-copybox-btn" id="btnCopyCommand" title="Copy to clipboard">
          <svg class="copy-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          <svg class="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>
      <button class="btn-check-again" id="btnCheckAgain">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        Check again
      </button>
    </div>

    <!-- Not YouTube -->
    <div id="stateNotYoutube" class="state" hidden>
      <p class="message">Navigate to a YouTube video</p>
      <p class="submessage">Open any YouTube video to transcribe it</p>
    </div>

    <!-- Ready (not yet transcribed, or already transcribed) -->
    <div id="stateReady" class="state" hidden>
      <h1 class="panel-title" id="videoTitle"></h1>
      <button class="btn-transcribe" id="btnTranscribe">Transcribe</button>
      <a class="already-transcribed" id="btnAlreadyTranscribed" href="#" hidden>
        <span class="already-transcribed-text">Already transcribed</span>
        <svg class="already-transcribed-arrow" width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l6 6-6 6"/></svg>
      </a>
    </div>

    <!-- Transcribing -->
    <div id="stateTranscribing" class="state" hidden>
      <!-- Currently transcribing item -->
      <div class="queue-card">
        <div class="queue-card-row">
          <span class="status-dot processing"></span>
          <div class="queue-card-content">
            <div class="queue-card-title" id="transcribingTitle"></div>
            <div class="queue-card-status" id="progressText">Sending to transcriber...</div>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
      </div>

      <button class="btn-cancel" id="btnCancel">Cancel</button>

      <!-- Queue current video while another is transcribing -->
      <div id="queuePrompt" class="queue-card queue-card-prompt" hidden>
        <div class="queue-card-row">
          <span class="status-dot pending"></span>
          <div class="queue-card-content">
            <div class="queue-card-title" id="queueVideoTitle"></div>
          </div>
          <button class="btn-queue" id="btnQueue">Queue</button>
        </div>
      </div>

      <!-- Queued items -->
      <div id="queueList" class="queue-list" hidden></div>
    </div>

    <!-- Error -->
    <div id="stateError" class="state" hidden>
      <p class="error-message" id="errorMessage"></p>
      <button class="btn-retry" id="btnRetry">Retry</button>
    </div>

    <!-- Recent Transcripts -->
    <div id="recentSection" class="recent-section" hidden>
      <div class="section-label">Recent</div>
      <div id="recentList" class="recent-list"></div>
    </div>

    <!-- Footer — GitHub link + star prompt, persistent across all states -->
    <div class="panel-footer">
      <a class="github-link" href="https://github.com/lifesized/youtube-transcriber" target="_blank" title="View on GitHub">
        <svg class="github-icon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span class="github-star-label">⭐ Star if it saves you time</span>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
