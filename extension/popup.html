<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- No Service -->
    <div id="stateNoService" class="state" hidden>
      <p class="message">Service offline</p>
      <p class="submessage">Start the app with <code>npm run dev</code></p>
      <p class="submessage">localhost:19720</p>
    </div>

    <!-- Not YouTube -->
    <div id="stateNotYoutube" class="state" hidden>
      <p class="message">Navigate to a YouTube video</p>
      <p class="submessage">Open any YouTube video to transcribe it</p>
    </div>

    <!-- Ready (not yet transcribed, or already transcribed) -->
    <div id="stateReady" class="state" hidden>
      <h1 class="panel-title" id="videoTitle"></h1>
      <button class="btn-transcribe" id="btnTranscribe">Transcribe</button>
      <a class="already-transcribed" id="btnAlreadyTranscribed" href="#" hidden>
        <span class="already-transcribed-text">Already transcribed</span>
        <svg class="already-transcribed-arrow" width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4l6 6-6 6"/></svg>
      </a>
    </div>

    <!-- Transcribing -->
    <div id="stateTranscribing" class="state" hidden>
      <!-- Currently transcribing item -->
      <div class="queue-card">
        <div class="queue-card-row">
          <span class="status-dot processing"></span>
          <div class="queue-card-content">
            <div class="queue-card-title" id="transcribingTitle"></div>
            <div class="queue-card-status" id="progressText">Sending to transcriber...</div>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
      </div>

      <!-- Queue current video while another is transcribing -->
      <div id="queuePrompt" class="queue-card queue-card-prompt" hidden>
        <div class="queue-card-row">
          <span class="status-dot pending"></span>
          <div class="queue-card-content">
            <div class="queue-card-title" id="queueVideoTitle"></div>
          </div>
          <button class="btn-queue" id="btnQueue">Queue</button>
        </div>
      </div>

      <!-- Queued items -->
      <div id="queueList" class="queue-list" hidden></div>
    </div>

    <!-- Error -->
    <div id="stateError" class="state" hidden>
      <p class="error-message" id="errorMessage"></p>
      <button class="btn-retry" id="btnRetry">Retry</button>
    </div>

    <!-- Recent Transcripts -->
    <div id="recentSection" class="recent-section" hidden>
      <div class="section-label">Recent</div>
      <div id="recentList" class="recent-list"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
